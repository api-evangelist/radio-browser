aid: radio-browser
name: Radio Browser
description: >-
  Radio Browser is a free, community-driven directory of internet radio stations. The project publishes a public REST
  API exposing the full catalog of stations along with category aggregates (countries, states, languages, tags, codecs),
  click counting, voting, and station submission. Mirrors are discovered through a round-robin DNS pool
  (all.api.radio-browser.info) and the canonical server software (radiobrowser-api-rust) is released under AGPL-3.0, so
  anyone can self-host an additional mirror.
