naftiko: 1.0.0-alpha2
info:
  label: Radio Browser — Categories
  description: 'Radio Browser Categories capability exposing aggregated counts of countries, languages, tags, codecs, and states.'
  tags:
  - Radio Browser
  - Categories
  - Music
  created: '2026-05-28'
  modified: '2026-05-28'
binds:
- namespace: env
  keys:
    RADIO_BROWSER_USER_AGENT: RADIO_BROWSER_USER_AGENT
capability:
  consumes:
  - type: http
    namespace: radio-browser-categories
    baseUri: https://de1.api.radio-browser.info
    description: Read-only HTTP capability over Radio Browser facet aggregates.
    headers:
      User-Agent: '{{env.RADIO_BROWSER_USER_AGENT}}'
    resources:
    - name: countries
      path: /json/countries
      operations:
      - name: listCountries
        method: GET
        description: List Countries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: countrycodes
      path: /json/countrycodes
      operations:
      - name: listCountryCodes
        method: GET
        description: List Country Codes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: languages
      path: /json/languages
      operations:
      - name: listLanguages
        method: GET
        description: List Languages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: tags
      path: /json/tags
      operations:
      - name: listTags
        method: GET
        description: List Tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: codecs
      path: /json/codecs
      operations:
      - name: listCodecs
        method: GET
        description: List Codecs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: states
      path: /json/states
      operations:
      - name: listStates
        method: GET
        description: List States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    authentication:
      type: none
  exposes:
  - type: mcp
    namespace: radio-browser-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing Radio Browser facet aggregate listings.
    tools:
    - name: list-countries
      description: List Countries
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: radio-browser-categories.listCountries
      outputParameters:
      - type: array
        mapping: $.
    - name: list-country-codes
      description: List Country Codes
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: radio-browser-categories.listCountryCodes
      outputParameters:
      - type: array
        mapping: $.
    - name: list-languages
      description: List Languages
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: radio-browser-categories.listLanguages
      outputParameters:
      - type: array
        mapping: $.
    - name: list-tags
      description: List Tags
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: radio-browser-categories.listTags
      outputParameters:
      - type: array
        mapping: $.
    - name: list-codecs
      description: List Codecs
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: radio-browser-categories.listCodecs
      outputParameters:
      - type: array
        mapping: $.
    - name: list-states
      description: List States
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: radio-browser-categories.listStates
      outputParameters:
      - type: array
        mapping: $.
